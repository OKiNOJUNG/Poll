<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการ Poll ร้านอาหาร (Real-time)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { light: '#e6f4f1', DEFAULT: '#9ad0c2', dark: '#265073' } } } } }
    </script>
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.98); box-shadow: 0 15px 35px rgba(45, 106, 79, 0.1); }
        .admin-only { border: 2px dashed #9ad0c2; position: relative; }
        .admin-label { position: absolute; top: -12px; left: 10px; background: #9ad0c2; color: white; padding: 0 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .progress-bar-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #9ad0c2; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="loader mb-4" style="width: 50px; height: 50px; border-width: 5px;"></div>
        <p id="loadingText" class="text-brand-dark font-bold text-lg animate-pulse">กำลังซิงค์ข้อมูลส่วนกลาง...</p>
    </div>

    <div class="glass-card rounded-3xl w-full max-w-2xl p-6 md:p-10 border-t-8 border-brand shadow-xl">
        
        <div class="mb-8 relative" id="headerContainer">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <h1 id="displayTitle" class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">กำลังโหลดข้อมูล...</h1>
                    <p id="displayDesc" class="text-gray-500">กรุณารอสักครู่</p>
                    <div id="pollDateDisplay" class="mt-4 inline-flex items-center text-sm font-medium px-4 py-2 rounded-full border transition-colors hidden">
                        <i class="fa-regular fa-clock mr-2"></i><span id="dateText"></span>
                    </div>
                </div>
                <button id="btnEditHeader" onclick="editHeader()" class="hidden bg-gray-100 hover:bg-gray-200 p-2 rounded-lg ml-2 transition shadow-sm">
                    <i class="fa-solid fa-pen-to-square text-brand-dark"></i>
                </button>
            </div>
        </div>

        <div id="adminDateSection" class="hidden bg-brand-light rounded-2xl p-5 mb-8 admin-only">
            <span class="admin-label">ตั้งค่าระบบ (Admin Only)</span>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">วันเริ่มต้น</label>
                    <input type="date" id="startDate" onchange="syncConfigToServer()" class="w-full px-4 py-2 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-brand outline-none text-gray-700">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">วันสิ้นสุด</label>
                    <input type="date" id="endDate" onchange="syncConfigToServer()" class="w-full px-4 py-2 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-brand outline-none text-gray-700">
                </div>
            </div>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h3 id="optionsTitle" class="text-lg font-bold text-gray-800">ตัวเลือกร้านอาหาร</h3>
                <button id="adminAddBtn" onclick="addOption()" class="hidden bg-brand hover:bg-teal-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> เพิ่มร้าน
                </button>
            </div>
            <div id="optionsList" class="space-y-4"></div>
        </div>

        <div id="adminShareSection" class="hidden border-t border-gray-100 pt-6">
            <button onclick="copyVoterLink()" class="w-full bg-brand-dark hover:bg-slate-800 text-white px-6 py-4 rounded-2xl font-bold transition flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-share-nodes mr-2"></i> คัดลอกลิงก์ส่งให้ผู้ร่วมโหวต
            </button>
        </div>

    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwS4xyI6O9mhG3vEtVIyBBf7AIK4Fy8hBbxWgc8tGk2JIWfCkEW0ZWVYa5GEYg2_sYESA/exec'; 

        const params = new URLSearchParams(window.location.search);
        const isAdmin = params.get('auth') === 'admin123';
        const hasVotedLocal = localStorage.getItem('voted_status') === 'true';

        // โครงสร้างข้อมูลหลัก
        let pollData = { config: {}, scores: {}, totalVotes: 0 };

        function formatDateThai(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        async function initApp() {
            if (isAdmin) {
                document.getElementById('btnEditHeader').classList.remove('hidden');
                document.getElementById('adminDateSection').classList.remove('hidden');
                document.getElementById('adminAddBtn').classList.remove('hidden');
                document.getElementById('adminShareSection').classList.remove('hidden');
            } else if (hasVotedLocal) {
                document.getElementById('displayDesc').className = "text-brand-dark font-semibold";
                document.getElementById('optionsTitle').innerText = "ผลคะแนนล่าสุด";
            }
            await fetchAllData();
        }

        // โหลดข้อมูลทั้งหมดจาก Database (Config + Scores)
        async function fetchAllData() {
            showLoading('กำลังโหลดข้อมูล...');
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                
                pollData.config = result.config;
                pollData.scores = result.scores;
                pollData.totalVotes = result.total;

                updateUI();
            } catch (error) {
                console.error("Error:", error);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            } finally {
                hideLoading();
            }
        }

        function getPollStatus() {
            const now = new Date();
            now.setHours(0,0,0,0);
            const start = new Date(pollData.config.startDate);
            const end = new Date(pollData.config.endDate);
            
            if (now < start) return { active: false, msg: 'ยังไม่เปิดให้โหวต', type: 'pending' };
            if (now > end) return { active: false, msg: 'ปิดรับโหวตแล้ว', type: 'expired' };
            return { active: true, msg: 'เปิดให้โหวต', type: 'active' };
        }

        // อัปเดตหน้าจอทั้งหมด
        function updateUI() {
            document.getElementById('displayTitle').innerText = pollData.config.title;
            if (hasVotedLocal && !isAdmin) {
                document.getElementById('displayDesc').innerText = "ขอบคุณที่ร่วมโหวต! ด้านล่างคือผลการโหวตทั้งหมดแบบ Real-time";
            } else {
                document.getElementById('displayDesc').innerText = pollData.config.desc;
            }

            // จัดการวันที่ (Admin + User)
            if(isAdmin) {
                document.getElementById('startDate').value = pollData.config.startDate;
                document.getElementById('endDate').value = pollData.config.endDate;
            }
            
            const badge = document.getElementById('pollDateDisplay');
            badge.classList.remove('hidden');
            const status = getPollStatus();
            const startStr = formatDateThai(pollData.config.startDate);
            const endStr = formatDateThai(pollData.config.endDate);

            if (status.type === 'active') {
                badge.className = "mt-4 inline-flex items-center bg-teal-50 text-teal-700 text-sm font-medium px-4 py-2 rounded-full border border-teal-200 transition-colors";
                document.getElementById('dateText').innerText = `เปิดรับโหวต: ${startStr} - ${endStr}`;
            } else if (status.type === 'expired') {
                badge.className = "mt-4 inline-flex items-center bg-red-50 text-red-600 text-sm font-medium px-4 py-2 rounded-full border border-red-200 transition-colors";
                document.getElementById('dateText').innerText = `หมดเวลาโหวต (สิ้นสุดเมื่อ ${endStr})`;
            } else {
                badge.className = "mt-4 inline-flex items-center bg-yellow-50 text-yellow-600 text-sm font-medium px-4 py-2 rounded-full border border-yellow-200 transition-colors";
                document.getElementById('dateText').innerText = `เปิดรับโหวต: ${startStr} - ${endStr}`;
            }

            renderOptionsList(status);
        }

        function renderOptionsList(status) {
            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            // นำคะแนนใส่ลงไปในออปชันเพื่อเตรียมจัดเรียง
            let displayOptions = pollData.config.options.map(opt => ({
                ...opt,
                score: pollData.scores[opt.id] || 0
            }));

            if (hasVotedLocal && !isAdmin) {
                displayOptions.sort((a, b) => b.score - a.score);
            }

            if (displayOptions.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-4">ยังไม่มีตัวเลือกร้านอาหาร</p>';
            }

            displayOptions.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'relative bg-white p-4 rounded-2xl border border-gray-100 shadow-sm overflow-hidden z-10 transition';
                
                let actionArea = '';
                let percentBar = '';

                if (hasVotedLocal || isAdmin) {
                    const percent = pollData.totalVotes > 0 ? Math.round((opt.score / pollData.totalVotes) * 100) : 0;
                    percentBar = `<div class="absolute top-0 left-0 h-full bg-brand-light progress-bar-fill -z-10" style="width: 0%;" data-target-width="${percent}%"></div>`;
                    
                    actionArea = `
                        <div class="flex items-center gap-4">
                            <div class="text-right mr-2">
                                <span class="text-lg font-bold text-brand-dark">${percent}%</span>
                                <span class="block text-xs text-gray-500">(${opt.score} โหวต)</span>
                            </div>
                            ${isAdmin ? `<button onclick="deleteOption(${opt.id})" class="text-red-300 hover:text-red-500 p-2 relative z-20"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                        </div>
                    `;
                } else {
                    if (status.active) {
                        actionArea = `<button onclick="vote(${opt.id})" class="bg-brand text-white px-6 py-2 rounded-xl font-bold hover:bg-teal-500 transition relative z-20 shadow-sm">โหวต</button>`;
                    } else {
                        actionArea = `<button disabled class="bg-gray-100 text-gray-400 px-4 py-2 rounded-xl font-bold cursor-not-allowed text-xs">${status.msg}</button>`;
                    }
                }

                div.innerHTML = `
                    ${percentBar}
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center text-2xl mr-4 shrink-0">${opt.emoji || '🍴'}</div>
                            <div>
                                <div class="font-bold text-gray-800">${opt.name}</div>
                                <div class="text-xs text-gray-500">${opt.sub || ''}</div>
                            </div>
                        </div>
                        ${actionArea}
                    </div>
                `;
                list.appendChild(div);
            });

            setTimeout(() => {
                document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target-width');
                });
            }, 100);
        }

        // ==========================================
        // ส่วนการทำงานของฝั่ง ADMIN (แก้ไขข้อมูลแล้วยิงขึ้น Database)
        // ==========================================

        // ฟังก์ชันบันทึกการตั้งค่า (Config) ทับบน Database
        async function syncConfigToServer() {
            if (!isAdmin) return;
            
            // ดึงค่าวันที่ล่าสุดจากช่อง Input เผื่อมีการแก้ไข
            pollData.config.startDate = document.getElementById('startDate').value;
            pollData.config.endDate = document.getElementById('endDate').value;

            showLoading('กำลังบันทึกการตั้งค่าลงระบบกลาง...');
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'update_config', config: pollData.config }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const resData = await response.json();
                if(resData.success) {
                    // สร้าง Toast เด้งเตือนว่าสำเร็จ
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'อัปเดตระบบแล้ว', showConfirmButton: false, timer: 1500 });
                    updateUI(); // รีเฟรชหน้าจอ
                }
            } catch(err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
            } finally {
                hideLoading();
            }
        }

        async function editHeader() {
            if (!isAdmin) return;
            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขหัวข้อและรายละเอียด',
                html: `<input id="swal-title" class="swal2-input" value="${pollData.config.title}"><textarea id="swal-desc" class="swal2-textarea">${pollData.config.desc}</textarea>`,
                confirmButtonColor: '#9ad0c2',
                preConfirm: () => [document.getElementById('swal-title').value, document.getElementById('swal-desc').value]
            });
            if (formValues) { 
                pollData.config.title = formValues[0]; 
                pollData.config.desc = formValues[1]; 
                await syncConfigToServer();
            }
        }

        async function addOption() {
            if (!isAdmin) return;
            const emojis = ['🍣', '🍔', '🍜', '🥘', '🥩', '🥗', '🍕', '🍱'];
            
            Swal.fire({
                title: 'เพิ่มตัวเลือกร้านอาหาร',
                html: '<input id="n1" class="swal2-input" placeholder="ชื่อร้าน (ไทย)"><input id="n2" class="swal2-input" placeholder="รายละเอียดหรือชื่อ(Eng)">',
                confirmButtonColor: '#9ad0c2',
                preConfirm: () => [document.getElementById('n1').value, document.getElementById('n2').value]
            }).then(async (res) => {
                if (res.isConfirmed && res.value[0]) {
                    const newId = Date.now(); // สร้างไอดีใหม่ไม่ให้ซ้ำ
                    pollData.config.options.push({ 
                        id: newId, 
                        name: res.value[0], 
                        sub: res.value[1], 
                        emoji: emojis[Math.floor(Math.random() * emojis.length)] 
                    });
                    await syncConfigToServer();
                }
            });
        }

        function deleteOption(id) {
            if (!isAdmin) return;
            Swal.fire({
                title: 'ยืนยันการลบตัวเลือก?',
                text: "หากลบแล้วผู้ใช้จะไม่เห็นตัวเลือกนี้อีก",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ลบเลย'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    pollData.config.options = pollData.config.options.filter(o => o.id !== id);
                    await syncConfigToServer();
                }
            });
        }

        // ==========================================
        // ส่วนการทำงานของฝั่ง USER (โหวต)
        // ==========================================
        function vote(id) {
            const status = getPollStatus();
            if (!status.active) {
                Swal.fire('ขออภัย', status.msg, 'warning');
                return;
            }

            Swal.fire({
                title: 'ยืนยันตัวตน',
                text: 'กรุณากรอกรหัสพนักงานของคุณ',
                input: 'text',
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#9ad0c2',
                confirmButtonText: 'ยืนยัน',
                inputValidator: (value) => { if (!value) return 'กรุณากรอกรหัสพนักงาน!' }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const empId = result.value.trim().toUpperCase();
                    showLoading('กำลังตรวจสอบสิทธิ์...');

                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'vote', empId: empId, voteId: id }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        });
                        const resData = await response.json();

                        if(resData.success) {
                            localStorage.setItem('voted_status', 'true'); 
                            Swal.fire({ icon: 'success', title: 'สำเร็จ!', showConfirmButton: false, timer: 1500 }).then(() => window.location.reload());
                        } else {
                            Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: resData.message });
                        }
                    } catch(err) {
                        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
                    } finally {
                        hideLoading();
                    }
                }
            });
        }

        function copyVoterLink() {
            const voterUrl = window.location.href.split('?')[0]; 
            navigator.clipboard.writeText(voterUrl);
            Swal.fire({ icon: 'success', title: 'คัดลอกลิงก์สำเร็จ', text: 'ส่งลิงก์นี้ให้พนักงานโหวตได้เลย', confirmButtonColor: '#265073' });
        }

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
