<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบสำรวจร้านอาหาร (เชื่อมต่อระบบกลาง)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { light: '#e6f4f1', DEFAULT: '#9ad0c2', dark: '#265073' } } } } }
    </script>
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.98); box-shadow: 0 15px 35px rgba(45, 106, 79, 0.1); }
        .progress-bar-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Loader อนิเมชั่น */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #9ad0c2; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="loader mb-4" style="width: 50px; height: 50px; border-width: 5px;"></div>
        <p class="text-brand-dark font-bold text-lg animate-pulse">กำลังซิงค์ข้อมูลกับฐานข้อมูลส่วนกลาง...</p>
    </div>

    <div class="glass-card rounded-3xl w-full max-w-2xl p-6 md:p-10 border-t-8 border-brand shadow-xl">
        
        <div class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">แบบสำรวจร้านอาหารที่จะไปทาน</h1>
            <p id="displayDesc" class="text-gray-500">กรุณาเลือกร้านที่คุณอยากไปทานร่วมกัน (1 รหัสพนักงาน / 1 สิทธิ์)</p>
        </div>

        <div class="mb-8">
            <h3 id="optionsTitle" class="text-lg font-bold text-gray-800 mb-4">ตัวเลือกร้านอาหาร</h3>
            <div id="optionsList" class="space-y-4"></div>
        </div>

    </div>

    <script>
        // ==========================================
        // URL ของ Web App จาก Google Apps Script
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwS4xyI6O9mhG3vEtVIyBBf7AIK4Fy8hBbxWgc8tGk2JIWfCkEW0ZWVYa5GEYg2_sYESA/exec'; 

        // ตรวจสอบว่าในเครื่องนี้เคยโหวตหรือยัง
        const hasVotedLocal = localStorage.getItem('voted_status') === 'true';

        let pollData = {
            options: [
                { id: 1, name: 'ร้านซูชิ อร่อยเหาะ', sub: 'Delicious Sushi', score: 0, emoji: '🍣' },
                { id: 2, name: 'ร้านสเต็ก ย่างก้าว', sub: 'Step Steakhouse', score: 0, emoji: '🍔' },
                { id: 3, name: 'ร้านอาหารไทย ทิพย์สมัย', sub: 'Thipsamai Thai', score: 0, emoji: '🍜' },
                { id: 4, name: 'ร้านแกมซา', sub: 'Thai', score: 0, emoji: '🥘' }
            ],
            totalVotes: 0
        };

        // เริ่มต้นการทำงาน โหลดข้อมูลจาก Database ทันที
        async function initApp() {
            if(hasVotedLocal) {
                document.getElementById('displayDesc').innerText = "ขอบคุณที่ร่วมโหวต! ด้านล่างคือผลการโหวตทั้งหมดแบบ Real-time";
                document.getElementById('displayDesc').className = "text-brand-dark font-semibold";
            }
            await fetchScores();
        }

        // ดึงคะแนนล่าสุดจาก Google Sheets
        async function fetchScores() {
            if(!SCRIPT_URL || SCRIPT_URL === 'วาง_WEB_APP_URL_ของคุณที่นี่') {
                renderOptions(); 
                return;
            }

            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                
                pollData.totalVotes = result.total;
                pollData.options.forEach(opt => {
                    opt.score = result.scores[opt.id] || 0;
                });
            } catch (error) {
                console.error("Error fetching data:", error);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
                renderOptions();
            }
        }

        function renderOptions() {
            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            let displayOptions = [...pollData.options];
            if (hasVotedLocal) {
                displayOptions.sort((a, b) => b.score - a.score);
            }

            displayOptions.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'relative bg-white p-4 rounded-2xl border border-gray-100 shadow-sm overflow-hidden z-10 transition hover:shadow-md';
                
                let actionArea = '';
                let percentBar = '';

                if (hasVotedLocal) {
                    const percent = pollData.totalVotes > 0 ? Math.round((opt.score / pollData.totalVotes) * 100) : 0;
                    percentBar = `<div class="absolute top-0 left-0 h-full bg-brand-light progress-bar-fill -z-10" style="width: 0%;" data-target-width="${percent}%"></div>`;
                    actionArea = `
                        <div class="text-right mr-2">
                            <span class="text-lg font-bold text-brand-dark">${percent}%</span>
                            <span class="block text-xs text-gray-500">(${opt.score} โหวต)</span>
                        </div>
                    `;
                } else {
                    actionArea = `<button onclick="vote(${opt.id})" class="bg-brand text-white px-6 py-2 rounded-xl font-bold hover:bg-teal-500 transition relative z-20 shadow-sm">โหวต</button>`;
                }

                div.innerHTML = `
                    ${percentBar}
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center text-2xl mr-4 shrink-0">${opt.emoji}</div>
                            <div>
                                <div class="font-bold text-gray-800">${opt.name}</div>
                                <div class="text-xs text-gray-500">${opt.sub}</div>
                            </div>
                        </div>
                        ${actionArea}
                    </div>
                `;
                list.appendChild(div);
            });

            setTimeout(() => {
                document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target-width');
                });
            }, 100);
        }

        // ฟังก์ชันเมื่อกดโหวต (ส่งไปตรวจสอบที่ Backend)
        function vote(id) {
            Swal.fire({
                title: 'ยืนยันตัวตน',
                text: 'กรุณากรอกรหัสพนักงาน (Employee ID) ของคุณเพื่อลงคะแนน',
                input: 'text',
                inputPlaceholder: 'เช่น 105XXX',
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#9ad0c2',
                confirmButtonText: 'ยืนยันการโหวต',
                cancelButtonText: 'ยกเลิก',
                inputValidator: (value) => {
                    if (!value) return 'คุณต้องกรอกรหัสพนักงานก่อนครับ!'
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const empId = result.value.trim().toUpperCase();
                    
                    Swal.fire({
                        title: 'กำลังตรวจสอบสิทธิ์...',
                        text: 'กรุณารอสักครู่ ระบบกำลังเช็คข้อมูลกับฐานข้อมูลส่วนกลาง',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading() }
                    });

                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ empId: empId, voteId: id }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        });
                        
                        const resData = await response.json();

                        if(resData.success) {
                            localStorage.setItem('voted_status', 'true'); 
                            Swal.fire({ 
                                icon: 'success', 
                                title: 'บันทึกคะแนนสำเร็จ!', 
                                text: 'ขอบคุณที่ร่วมโหวต',
                                timer: 2000,
                                showConfirmButton: false
                            }).then(() => {
                                window.location.reload(); 
                            });
                        } else {
                            Swal.fire({ 
                                icon: 'error', 
                                title: 'ไม่สามารถโหวตได้', 
                                text: resData.message, 
                                confirmButtonColor: '#265073'
                            });
                        }

                    } catch(err) {
                        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้ ลองใหม่อีกครั้งครับ', 'error');
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
