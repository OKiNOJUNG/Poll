<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการ Poll ร้านอาหาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { light: '#e6f4f1', DEFAULT: '#9ad0c2', dark: '#265073' } } }
            }
        }
    </script>
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.98); box-shadow: 0 15px 35px rgba(45, 106, 79, 0.1); }
        .admin-only { border: 2px dashed #9ad0c2; position: relative; }
        .admin-label { position: absolute; top: -12px; left: 10px; background: #9ad0c2; color: white; padding: 0 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card rounded-3xl w-full max-w-2xl p-6 md:p-10 border-t-8 border-brand">
        
        <div class="mb-8 group relative" id="headerContainer">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <h1 id="displayTitle" class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">แบบสำรวจร้านอาหาร</h1>
                    <p id="displayDesc" class="text-gray-500">ช่วยกันเลือกหน่อยครับ/ค่ะ ว่าอยากไปทานร้านไหน?</p>
                </div>
                <button id="btnEditHeader" onclick="editHeader()" class="hidden bg-gray-100 hover:bg-gray-200 p-2 rounded-lg ml-2 transition">
                    <i class="fa-solid fa-pen-to-square text-brand-dark"></i>
                </button>
            </div>
        </div>

        <div id="adminDateSection" class="hidden bg-brand-light rounded-2xl p-5 mb-8 admin-only">
            <span class="admin-label">ระยะเวลาแบบสำรวจ (Admin Only)</span>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">วันเริ่มต้น</label>
                    <input type="date" id="startDate" class="w-full px-4 py-2 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-brand outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">วันสิ้นสุด</label>
                    <input type="date" id="endDate" class="w-full px-4 py-2 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-brand outline-none">
                </div>
            </div>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">ตัวเลือกร้านอาหาร</h3>
                <button id="adminAddBtn" onclick="addOption()" class="hidden bg-brand hover:bg-teal-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> เพิ่มร้าน
                </button>
            </div>
            <div id="optionsList" class="space-y-3"></div>
        </div>

        <div id="adminShareSection" class="hidden border-t border-gray-100 pt-6">
            <button onclick="copyVoterLink()" class="w-full bg-brand-dark hover:bg-slate-800 text-white px-6 py-4 rounded-2xl font-bold transition flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-share-nodes mr-2"></i> คัดลอกลิงก์ส่งให้ผู้ร่วมโหวต
            </button>
            <p class="text-center text-xs text-gray-400 mt-3">* ลิงก์สำหรับผู้โหวตจะถูกล็อกสิทธิ์การแก้ไขโดยอัตโนมัติ</p>
        </div>

    </div>

    <script>
        // ตรวจสอบสิทธิ์จาก URL Parameter
        const params = new URLSearchParams(window.location.search);
        const isAdmin = params.get('auth') === 'admin123'; // รหัสผ่านจำลองผ่าน URL
        const hasVoted = localStorage.getItem('voted_status') === 'true';

        // ข้อมูลเริ่มต้น
        let pollData = {
            title: "โหวตร้านอาหารประจำเดือน",
            desc: "เลือกทีมที่คุณอยากไปทานร่วมกันมากที่สุด (1 ท่าน / 1 โหวต)",
            options: [
                { id: 1, name: 'ร้านซูชิ อร่อยเหาะ', sub: 'Delicious Sushi', score: 12, emoji: '🍣' },
                { id: 2, name: 'ร้านสเต็ก ย่างก้าว', sub: 'Step Steakhouse', score: 8, emoji: '🍔' }
            ]
        };

        function initApp() {
            // อัปเดต UI ตามสิทธิ์
            if (isAdmin) {
                document.getElementById('btnEditHeader').classList.remove('hidden');
                document.getElementById('adminDateSection').classList.remove('hidden');
                document.getElementById('adminAddBtn').classList.remove('hidden');
                document.getElementById('adminShareSection').classList.remove('hidden');
            }
            
            // โหลดข้อมูลจาก LocalStorage (ถ้ามี)
            const savedData = localStorage.getItem('poll_content');
            if (savedData) pollData = JSON.parse(savedData);

            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('displayTitle').innerText = pollData.title;
            document.getElementById('displayDesc').innerText = pollData.desc;
            renderOptions();
        }

        function renderOptions() {
            const list = document.getElementById('optionsList');
            list.innerHTML = '';

            pollData.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-white p-4 rounded-2xl border border-gray-100 shadow-sm';
                
                let actionArea = '';
                if (isAdmin) {
                    // Admin: เห็นคะแนนและปุ่มจัดการ
                    actionArea = `
                        <div class="flex items-center gap-4">
                            <div class="text-right mr-2">
                                <span class="block text-[10px] text-gray-400 font-bold uppercase">Score</span>
                                <span class="text-lg font-bold text-brand-dark">${opt.score}</span>
                            </div>
                            <button onclick="deleteOption(${opt.id})" class="text-red-300 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    `;
                } else if (hasVoted) {
                    // Voter ที่โหวตแล้ว: เห็นคะแนนอย่างเดียว
                    actionArea = `<div class="font-bold text-brand-dark text-xl">${opt.score}</div>`;
                } else {
                    // Voter ที่ยังไม่โหวต: เห็นปุ่มโหวต
                    actionArea = `<button onclick="vote(${opt.id})" class="bg-brand text-white px-6 py-2 rounded-xl font-bold hover:bg-teal-500 transition">โหวต</button>`;
                }

                div.innerHTML = `
                    <div class="flex items-center">
                        <div class="text-2xl mr-4">${opt.emoji}</div>
                        <div>
                            <div class="font-bold text-gray-800">${opt.name}</div>
                            <div class="text-xs text-gray-400">${opt.sub}</div>
                        </div>
                    </div>
                    ${actionArea}
                `;
                list.appendChild(div);
            });
        }

        // --- ฟังก์ชันสำหรับ ADMIN เท่านั้น ---

        async function editHeader() {
            if (!isAdmin) return;
            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขหัวข้อโพล',
                html:
                    `<input id="swal-title" class="swal2-input" value="${pollData.title}" placeholder="หัวข้อหลัก">` +
                    `<textarea id="swal-desc" class="swal2-textarea" placeholder="รายละเอียด">${pollData.desc}</textarea>`,
                confirmButtonColor: '#9ad0c2',
                preConfirm: () => [
                    document.getElementById('swal-title').value,
                    document.getElementById('swal-desc').value
                ]
            });

            if (formValues) {
                pollData.title = formValues[0];
                pollData.desc = formValues[1];
                saveToLocal();
                updateDisplay();
            }
        }

        function addOption() {
            if (!isAdmin) return;
            Swal.fire({
                title: 'เพิ่มร้านอาหารใหม่',
                html: '<input id="n1" class="swal2-input" placeholder="ชื่อร้าน (ไทย)"><input id="n2" class="swal2-input" placeholder="ชื่อร้าน (Eng)">',
                confirmButtonColor: '#9ad0c2',
                preConfirm: () => [document.getElementById('n1').value, document.getElementById('n2').value]
            }).then(res => {
                if (res.value && res.value[0]) {
                    pollData.options.push({
                        id: Date.now(),
                        name: res.value[0],
                        sub: res.value[1],
                        score: 0,
                        emoji: '🍴'
                    });
                    saveToLocal();
                    updateDisplay();
                }
            });
        }

        function deleteOption(id) {
            if (!isAdmin) return;
            pollData.options = pollData.options.filter(o => o.id !== id);
            saveToLocal();
            updateDisplay();
        }

        function copyVoterLink() {
            const voterUrl = window.location.href.split('?')[0]; // ตัด ?auth=... ออก
            navigator.clipboard.writeText(voterUrl);
            Swal.fire({ icon: 'success', title: 'คัดลอกลิงก์สำเร็จ', text: 'ส่งลิงก์นี้ให้ผู้โหวตได้เลย (ผู้รับจะไม่เห็นเมนู Admin)', confirmButtonColor: '#265073' });
        }

        // --- ฟังก์ชันสำหรับ VOTER ---

        function vote(id) {
            Swal.fire({
                title: 'ยืนยันการลงคะแนน?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#9ad0c2'
            }).then(res => {
                if (res.isConfirmed) {
                    const target = pollData.options.find(o => o.id === id);
                    target.score++;
                    localStorage.setItem('voted_status', 'true');
                    saveToLocal();
                    updateDisplay();
                    Swal.fire({ icon: 'success', title: 'โหวตสำเร็จ!', showConfirmButton: false, timer: 1500 });
                }
            });
        }

        function saveToLocal() {
            localStorage.setItem('poll_content', JSON.stringify(pollData));
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
